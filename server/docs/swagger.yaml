basePath: /
definitions:
  auth.DeviceTokenRecord:
    properties:
      createdAt:
        type: string
      deviceId:
        type: string
      deviceName:
        type: string
      lastUsedAt:
        type: string
      revokedAt:
        type: string
      tokenHash:
        type: string
    type: object
  handlers.ImportRepositoryRequest:
    properties:
      name:
        type: string
      path:
        type: string
    type: object
  handlers.LocalPairRequest:
    properties:
      masterPassword:
        type: string
    type: object
  handlers.PairExchangeRequest:
    properties:
      deviceName:
        type: string
      masterPassword:
        type: string
      sessionId:
        type: string
    type: object
  handlers.PairExchangeResponse:
    properties:
      deviceId:
        type: string
      token:
        type: string
    type: object
  handlers.PairSessionResponse:
    properties:
      expiresAt:
        type: string
      sessionId:
        type: string
    type: object
  models.Author:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
    type: object
  models.Branch:
    properties:
      is_current:
        example: true
        type: boolean
      is_remote:
        example: false
        type: boolean
      last_commit:
        $ref: '#/definitions/models.Commit'
      name:
        example: feature/new-feature
        type: string
      upstream:
        example: origin/main
        type: string
    type: object
  models.Commit:
    properties:
      author:
        $ref: '#/definitions/models.Author'
      date:
        type: string
      hash:
        example: abc123def456...
        type: string
      message:
        example: Fix bug in authentication
        type: string
      parent_hash:
        type: string
    type: object
  models.CommitDetail:
    properties:
      author:
        $ref: '#/definitions/models.Author'
      changes:
        items:
          $ref: '#/definitions/models.FileDiff'
        type: array
      date:
        type: string
      hash:
        example: abc123def456...
        type: string
      message:
        example: Fix bug in authentication
        type: string
      parent_hash:
        type: string
      stats:
        $ref: '#/definitions/models.DiffStats'
    type: object
  models.CommitRequest:
    properties:
      author:
        $ref: '#/definitions/models.Author'
      files:
        items:
          type: string
        type: array
      message:
        example: Fix typo in README
        type: string
    type: object
  models.CreateRepositoryRequest:
    properties:
      description:
        example: A new repository
        type: string
      is_local:
        example: true
        type: boolean
      name:
        example: my-new-repo
        type: string
      path:
        example: /home/user/projects/my-repo
        type: string
      url:
        example: https://github.com/user/repo.git
        type: string
    type: object
  models.DiffBlock:
    properties:
      collapsed:
        description: true if context block >= 6 lines
        type: boolean
      endNew:
        description: last new line number (0 if N/A)
        type: integer
      endOld:
        description: last old line number (0 if N/A)
        type: integer
      lines:
        description: all lines in this block
        items:
          $ref: '#/definitions/models.DiffLineTokenized'
        type: array
      startNew:
        description: first new line number (0 if N/A)
        type: integer
      startOld:
        description: first old line number (0 if N/A)
        type: integer
      type:
        description: '"added" | "deleted" | "context"'
        type: string
    type: object
  models.DiffHunk:
    properties:
      lines:
        items:
          $ref: '#/definitions/models.DiffLine'
        type: array
      new_count:
        example: 7
        type: integer
      new_start:
        example: 12
        type: integer
      old_count:
        example: 5
        type: integer
      old_start:
        example: 10
        type: integer
    type: object
  models.DiffHunkTokenized:
    properties:
      blocks:
        description: grouped lines
        items:
          $ref: '#/definitions/models.DiffBlock'
        type: array
      header:
        description: '"@@ -14,8 +14,10 @@"'
        type: string
    type: object
  models.DiffLine:
    properties:
      content:
        example: func main() {}
        type: string
      new_line:
        example: 1
        type: integer
      old_line:
        example: 0
        type: integer
      type:
        example: added
        type: string
    type: object
  models.DiffLineTokenized:
    properties:
      newNum:
        type: integer
      oldNum:
        type: integer
      tokens:
        description: syntax-highlighted fragments
        items:
          $ref: '#/definitions/models.Token'
        type: array
      type:
        description: '"added" | "deleted" | "context"'
        type: string
    type: object
  models.DiffResult:
    properties:
      hunks:
        items:
          $ref: '#/definitions/models.DiffHunk'
        type: array
      new_file:
        example: src/new.go
        type: string
      old_file:
        example: src/old.go
        type: string
    type: object
  models.DiffStats:
    properties:
      additions:
        example: 10
        type: integer
      deletions:
        example: 3
        type: integer
      files_changed:
        example: 2
        type: integer
    type: object
  models.DirectoryEntry:
    properties:
      is_directory:
        example: true
        type: boolean
      is_git_repo:
        example: true
        type: boolean
      is_hidden:
        example: false
        type: boolean
      mod_time:
        example: "2024-01-15T10:30:00Z"
        type: string
      name:
        example: my-project
        type: string
      path:
        example: /home/user/projects/my-project
        type: string
      permissions:
        example: drwxr-xr-x
        type: string
      size:
        example: 4096
        type: integer
    type: object
  models.DirectoryListing:
    properties:
      can_go_up:
        example: true
        type: boolean
      current_path:
        example: /home/user/projects
        type: string
      entries:
        items:
          $ref: '#/definitions/models.DirectoryEntry'
        type: array
      parent_path:
        example: /home/user
        type: string
    type: object
  models.FileChange:
    properties:
      path:
        example: src/main.go
        type: string
      status:
        example: modified
        type: string
      type:
        example: A
        type: string
    type: object
  models.FileDiff:
    properties:
      additions:
        example: 5
        type: integer
      change_type:
        example: modified
        type: string
      deletions:
        example: 2
        type: integer
      patch:
        type: string
      path:
        example: src/auth.go
        type: string
    type: object
  models.FileInfo:
    properties:
      is_directory:
        example: false
        type: boolean
      mod_time:
        type: string
      mode:
        type: string
      name:
        example: main.go
        type: string
      path:
        example: src/main.go
        type: string
      size:
        example: 1024
        type: integer
    type: object
  models.GenerateCommitMessageResponse:
    properties:
      message:
        example: 'Fix: Handle null pointer in auth flow'
        type: string
    type: object
  models.GitConfig:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
    type: object
  models.RepoCommitSettings:
    properties:
      defaultBranch:
        example: main
        type: string
      lineEndings:
        example: lf
        type: string
      signingEnabled:
        example: false
        type: boolean
    type: object
  models.RepoDirectoryListing:
    properties:
      entries:
        description: Files and directories in current path
        items:
          $ref: '#/definitions/models.FileInfo'
        type: array
      has_more:
        description: True if more entries exist
        example: true
        type: boolean
      offset:
        description: Current pagination offset
        example: 0
        type: integer
      parent_path:
        description: Parent directory (empty if root)
        example: src
        type: string
      path:
        description: Current directory path (empty for root)
        example: src/components
        type: string
      total_count:
        description: Total entries in directory (before pagination)
        example: 42
        type: integer
    type: object
  models.RepoIdentitySettings:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
    type: object
  models.RepoRemote:
    properties:
      name:
        example: origin
        type: string
      url:
        example: https://github.com/user/repo.git
        type: string
    type: object
  models.RepoSettings:
    properties:
      commit:
        $ref: '#/definitions/models.RepoCommitSettings'
      identity:
        $ref: '#/definitions/models.RepoIdentitySettings'
      remotes:
        items:
          $ref: '#/definitions/models.RepoRemote'
        type: array
      sync:
        $ref: '#/definitions/models.RepoSyncSettings'
    type: object
  models.RepoSyncSettings:
    properties:
      autoFetch:
        example: true
        type: boolean
      fetchIntervalMinutes:
        example: 15
        type: integer
      pullStrategy:
        example: merge
        type: string
    type: object
  models.Repository:
    properties:
      created_at:
        type: string
      current_branch:
        example: main
        type: string
      description:
        example: My awesome project
        type: string
      id:
        example: repo-abc123
        type: string
      is_local:
        example: true
        type: boolean
      name:
        example: my-project
        type: string
      path:
        example: /Users/john/.gitty/repositories/my-project
        type: string
      updated_at:
        type: string
      url:
        example: https://github.com/user/repo.git
        type: string
    type: object
  models.RepositoryStatus:
    properties:
      ahead:
        example: 2
        type: integer
      behind:
        example: 1
        type: integer
      branch:
        example: main
        type: string
      conflicts:
        items:
          type: string
        type: array
      is_clean:
        example: false
        type: boolean
      modified:
        items:
          $ref: '#/definitions/models.FileChange'
        type: array
      repository_id:
        example: repo-abc123
        type: string
      staged:
        items:
          $ref: '#/definitions/models.FileChange'
        type: array
      untracked:
        items:
          type: string
        type: array
    type: object
  models.Token:
    properties:
      color:
        type: string
      text:
        type: string
    type: object
  models.TokenizedCommitDiff:
    properties:
      author:
        $ref: '#/definitions/models.Author'
      date:
        type: string
      files:
        items:
          $ref: '#/definitions/models.TokenizedFileDiff'
        type: array
      hash:
        type: string
      message:
        type: string
      stats:
        $ref: '#/definitions/models.DiffStats'
    type: object
  models.TokenizedDiff:
    properties:
      additions:
        type: integer
      deletions:
        type: integer
      filename:
        type: string
      has_more:
        type: boolean
      hunks:
        items:
          $ref: '#/definitions/models.DiffHunkTokenized'
        type: array
      next_cursor:
        type: integer
      total_hunks:
        type: integer
    type: object
  models.TokenizedFileDiff:
    properties:
      changeType:
        description: '"added" | "modified" | "deleted"'
        type: string
      diff:
        $ref: '#/definitions/models.TokenizedDiff'
      path:
        type: string
    type: object
host: localhost:8083
info:
  contact:
    email: support@gitty.local
    name: API Support
  description: |-
    GitWeb's backend API for managing Git repositories and browsing the local filesystem.
    This API provides endpoints for repository management, branch/commit operations, file management, and remote sync.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Gittyd API
  version: "1.0"
paths:
  /api/auth/devices:
    get:
      description: Returns all device records without including token hashes. Requires
        Bearer auth.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/auth.DeviceTokenRecord'
            type: array
      security:
      - BearerAuth: []
      summary: List paired devices
      tags:
      - auth
  /api/auth/devices/{deviceId}:
    delete:
      description: Revokes the device token. Returns 204 No Content on success.
      parameters:
      - description: Device ID
        in: path
        name: deviceId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: deviceId required
          schema:
            type: string
        "404":
          description: device not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Revoke a device
      tags:
      - auth
  /api/auth/local/pair:
    post:
      consumes:
      - application/json
      description: Issues a device token for localhost connections after validating
        the master password. This is a simplified flow for the web frontend.
      parameters:
      - description: Local pair request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LocalPairRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PairExchangeResponse'
        "400":
          description: missing masterPassword
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
        "403":
          description: forbidden
          schema:
            type: string
      summary: Localhost-only pairing
      tags:
      - auth
  /api/auth/pair/exchange:
    post:
      consumes:
      - application/json
      description: Validates the session and master password, then issues a new device
        token
      parameters:
      - description: Pair exchange request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.PairExchangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PairExchangeResponse'
        "400":
          description: invalid JSON or missing required fields
          schema:
            type: string
        "401":
          description: unauthorized
          schema:
            type: string
      summary: Exchange pairing session for token
      tags:
      - auth
  /api/auth/pair/session:
    get:
      consumes:
      - application/json
      description: Returns the current pairing session information for QR code scanning
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PairSessionResponse'
        "410":
          description: session expired or invalid
          schema:
            type: string
        "503":
          description: no active pairing session
          schema:
            type: string
      summary: Get current pairing session
      tags:
      - auth
  /api/filesystem/browse:
    get:
      description: Browse a directory on the filesystem
      parameters:
      - description: Directory path to browse
        in: query
        name: path
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DirectoryListing'
        "400":
          description: Bad request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Browse directory
      tags:
      - filesystem
  /api/filesystem/roots:
    get:
      description: List allowed root paths/volumes
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                type: string
              type: array
            type: object
      security:
      - BearerAuth: []
      summary: List volume roots
      tags:
      - filesystem
  /api/repos:
    get:
      description: Get all registered Git repositories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Repository'
            type: array
      security:
      - BearerAuth: []
      summary: List all repositories
      tags:
      - repositories
    post:
      consumes:
      - application/json
      description: Create a new Git repository or clone from URL
      parameters:
      - description: Request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateRepositoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Repository'
        "400":
          description: Bad request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create a new repository
      tags:
      - repositories
  /api/repos/{id}:
    delete:
      description: Delete a repository from Gittyd
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No content
          schema:
            type: string
        "404":
          description: Repository not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete a repository
      tags:
      - repositories
    get:
      description: Get details for a specific repository
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Repository'
        "404":
          description: Repository not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get repository by ID
      tags:
      - repositories
  /api/repos/{id}/branches:
    get:
      description: List all branches for a repository
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Branch'
            type: array
      security:
      - BearerAuth: []
      summary: List branches
      tags:
      - repositories
    post:
      consumes:
      - application/json
      description: Create a new branch
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      - description: Branch name
        in: query
        name: name
        required: true
        type: string
      - description: Source branch (optional)
        in: query
        name: from
        type: string
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Bad request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create a branch
      tags:
      - repositories
  /api/repos/{id}/branches/{branch}:
    delete:
      description: Delete a branch from the repository
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      - description: Branch name
        in: path
        name: branch
        required: true
        type: string
      responses:
        "204":
          description: Deleted
          schema:
            type: string
        "404":
          description: Repository or branch not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Delete a branch
      tags:
      - repositories
    put:
      description: Checkout a different branch
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      - description: Branch name
        in: path
        name: branch
        required: true
        type: string
      responses:
        "200":
          description: Success
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Switch branch
      tags:
      - repositories
  /api/repos/{id}/commit:
    post:
      consumes:
      - application/json
      description: Create a new commit with staged changes
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      - description: Request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CommitRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Commit'
        "400":
          description: Bad request
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Create a commit
      tags:
      - repositories
  /api/repos/{id}/commits:
    get:
      description: Get commit history for a repository
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Commit'
            type: array
        "404":
          description: Repository not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get commit history
      tags:
      - repositories
  /api/repos/{id}/commits/{hash}:
    get:
      description: Get detailed information about a specific commit
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      - description: Commit hash
        in: path
        name: hash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CommitDetail'
        "404":
          description: Repository or commit not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get commit details
      tags:
      - repositories
  /api/repos/{id}/config/git:
    get:
      description: Get Git configuration for a repository
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GitConfig'
        "404":
          description: Repository not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get Git config
      tags:
      - repositories
  /api/repos/{id}/diff:
    get:
      description: Get diff for a file
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      - description: File path
        in: path
        name: '"*"'
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DiffResult'
        "400":
          description: Bad request
          schema:
            type: string
        "404":
          description: Repository not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get file diff
      tags:
      - repositories
  /api/repos/{id}/diff/commit/{hash}/files:
    get:
      description: Get diff for a specific file in a commit
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      - description: Commit hash
        in: path
        name: hash
        required: true
        type: string
      - description: File path
        in: path
        name: '"*"'
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenizedDiff'
        "400":
          description: Bad request
          schema:
            type: string
        "404":
          description: Repository or commit not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Get commit file diff
      tags:
      - repositories
  /api/repos/{id}/diff/commit/tokenized:
    get:
      description: Get tokenized diff for a commit
      parameters:
      - description: Repository ID
        in: path
        name: id
        required: true
        type: string
      - description: Commit hash
        in: query
        name: hash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
